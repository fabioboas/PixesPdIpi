<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ingressos Esgotados - Baile do BIX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Efeito de grid neon (estilo arcade) */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 650px;
            width: 100%;
            background: rgba(10, 15, 30, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 64px;
            padding: 40px 28px 48px;
            text-align: center;
            border: 2px solid rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.1);
            transition: transform 0.2s ease;
        }

        /* ROSTINHO PACMAN NEON SORRINDO 😎 */
        .pacman-neon {
            margin: 0 auto 20px;
            width: 140px;
            height: 140px;
            position: relative;
            filter: drop-shadow(0 0 12px #00ffff) drop-shadow(0 0 25px #ff00cc);
            animation: floatGlow 2s infinite alternate ease-in-out;
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px); filter: drop-shadow(0 0 8px cyan) drop-shadow(0 0 15px magenta);}
            100% { transform: translateY(-8px); filter: drop-shadow(0 0 20px #0ff) drop-shadow(0 0 30px #f0f);}
        }

        /* corpo do PACMAN + olho + sorriso estilizado */
        .pac-body {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .pac-face {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 35%, #ffff00, #ffaa00);
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 45%, 20% 50%, 0% 55%);
            border-radius: 50%;
            position: absolute;
            top: 10px;
            left: 10px;
            animation: mordida 0.6s infinite alternate ease-in-out;
            box-shadow: 0 0 0 3px #ffdd44, inset 0 0 10px #ff6600;
        }

        /* olho grande estiloso neon */
        .olho {
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 40px;
            left: 65px;
            box-shadow: 0 0 8px cyan;
            z-index: 3;
        }
        .olho::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            background: #001d3d;
            border-radius: 50%;
            top: 5px;
            left: 5px;
            background: radial-gradient(circle, #000000, #222);
            box-shadow: 0 0 4px white;
        }
        /* sobrancelha estilosa */
        .sobrancelha {
            position: absolute;
            width: 28px;
            height: 6px;
            background: #ff55ff;
            border-radius: 20px;
            top: 28px;
            left: 62px;
            transform: rotate(-8deg);
            filter: blur(1px);
            box-shadow: 0 0 6px #ff44ff;
        }

        /* sorrisão neon - estilo "muito feliz" */
        .sorriso {
            position: absolute;
            width: 50px;
            height: 28px;
            border-bottom: 5px solid #ff44ee;
            border-radius: 0 0 40px 40px;
            bottom: 30px;
            left: 48px;
            filter: drop-shadow(0 0 5px #ff66ff);
            transform: rotate(2deg);
        }
        .sorriso::before {
            content: "😎";
            position: absolute;
            font-size: 28px;
            left: -12px;
            top: -18px;
            filter: drop-shadow(0 0 4px cyan);
        }
        .sorriso::after {
            content: "✨";
            position: absolute;
            font-size: 20px;
            right: -20px;
            top: -8px;
            filter: drop-shadow(0 0 3px gold);
        }

        @keyframes mordida {
            0% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 45%, 20% 50%, 0% 55%); }
            100% { clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 48%, 10% 50%, 0% 52%);}
        }

        /* texto principal */
        .title-esgotado {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin: 20px 0 16px;
            background: linear-gradient(135deg, #0ff, #ff44cc, #ffaa44);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0,255,255,0.4);
            word-break: keep-all;
        }

        .mensagem-principal {
            font-size: 1.6rem;
            font-weight: bold;
            color: #fff5e0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 18px 20px;
            border-radius: 60px;
            margin: 20px 0;
            border-left: 5px solid #0ff;
            border-right: 5px solid #f0f;
            font-family: 'Segoe UI', 'Courier New', monospace;
            line-height: 1.4;
        }

        .frase-feliz {
            font-size: 1.5rem;
            color: #ddff99;
            text-shadow: 0 0 6px #00cc33;
            font-weight: bold;
            display: inline-block;
            margin: 10px 0;
        }

        .emoji-list {
            font-size: 2.8rem;
            letter-spacing: 12px;
            margin: 20px 0 15px;
            filter: drop-shadow(0 0 4px gold);
        }

        .btn-neon {
            background: none;
            border: 2px solid #0ff;
            color: #0ff;
            padding: 12px 32px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-family: monospace;
            background: rgba(0, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .btn-neon:hover {
            background: #0ff;
            color: #0a0f1e;
            box-shadow: 0 0 20px cyan;
            border-color: magenta;
            text-shadow: none;
        }

        .footer-glow {
            margin-top: 32px;
            font-size: 0.85rem;
            color: cyan;
            text-shadow: 0 0 3px magenta;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            opacity: 0.9;
        }

        @media (max-width: 550px) {
            .container {
                padding: 28px 20px 36px;
            }
            .title-esgotado {
                font-size: 2.4rem;
            }
            .mensagem-principal {
                font-size: 1.2rem;
                padding: 14px 12px;
            }
            .frase-feliz {
                font-size: 1.2rem;
            }
            .pacman-neon {
                width: 110px;
                height: 110px;
            }
            .pac-face {
                width: 90px;
                height: 90px;
                top: 10px;
                left: 10px;
            }
            .olho {
                width: 16px;
                height: 16px;
                top: 28px;
                left: 48px;
            }
            .sorriso {
                width: 40px;
                bottom: 22px;
                left: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- ROSTINHO PACMAN NEON SORRINDO 😎 + custom neon -->
        <div class="pacman-neon">
            <div class="pac-body">
                <div class="pac-face"></div>
                <div class="olho"></div>
                <div class="sobrancelha"></div>
                <div class="sorriso"></div>
            </div>
        </div>
        
        <!-- texto high impact: ingressos esgotados -->
        <div class="title-esgotado">
            🚀 INGRESSOS ESGOTADOS! 🚀
        </div>
        
        <!-- mensagem pedida: "todos os ingressos vendidos. Bora dançar muito xote, comer, beber e ser feliz." -->
        <div class="mensagem-principal">
            🎟️🔥 <strong>TODOS OS INGRESSOS VENDIDOS!</strong> 🔥🎟️<br>
            💃🕺 Bora dançar muito xote, comer, beber e ser feliz. 🍻🍗🍹
        </div>
        
        <!-- frase extra de alegria neon -->
        <div class="frase-feliz">
            ✨ FESTA GARANTIDA ✨
        </div>
        
        <div class="emoji-list">
            🎶 🎸 🥁 🍺 🧉 🎉
        </div>
        
        <!-- botão pra animar / interação simples -->
        <button class="btn-neon" id="neonEffectBtn">
            🤘 CHAMA NA DANÇA 🤘
        </button>
        
        <div class="footer-glow">
            <span>⭐ BAILE DA INDEPENDÊNCIA OU XOTE ⭐</span>
            <span>🎭 PD IPIRANGA - 30 DE ABRIL</span>
            <span>🎟️ ESGOTADO COM SUCESSO 🎟️</span>
        </div>
    </div>

    <script>
        // Interação super simples: só pra dar aquele charme neon ao clicar no botão
        const btn = document.getElementById('neonEffectBtn');
        const container = document.querySelector('.container');
        const pacmanDiv = document.querySelector('.pacman-neon');
        
        btn.addEventListener('click', () => {
            // efeito pisca rápida nas bordas
            container.style.transition = '0.1s';
            container.style.borderColor = '#ff44ff';
            container.style.boxShadow = '0 0 35px #ff44ff, inset 0 0 25px #ff00aa';
            setTimeout(() => {
                container.style.borderColor = 'rgba(0, 255, 255, 0.6)';
                container.style.boxShadow = '0 0 30px rgba(0, 255, 255, 0.3), inset 0 0 20px rgba(0, 255, 255, 0.1)';
            }, 200);
            
            // dá um pulinho no pacman
            if(pacmanDiv) {
                pacmanDiv.style.animation = 'none';
                pacmanDiv.offsetHeight;
                pacmanDiv.style.animation = 'floatGlow 0.5s ease 3';
                setTimeout(() => {
                    pacmanDiv.style.animation = 'floatGlow 2s infinite alternate ease-in-out';
                }, 600);
            }
            
            // mensagem no console amigável
            console.log("🚀 VAI COMEÇAR O XOTE! TODOS OS INGRESSOS VENDIDOS, BORA SER FELIZ!");
            
            // (opcional) um alert estiloso? melhor não atrapalhar, mas pode dar um feedback pequeno
            // Mas o botão só de vibe!
        });
        
        // também garantir que o pacman tenha sempre a animação suave
    </script>
</body>
</html>
